<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Chat Clone Enhanced</title>
  <style>
    /* Global Styling */
    body {
      font-family: 'Poppins', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #e8f0ff, #fefefe);
      color: #333;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #111827;
      color: #f3f4f6;
    }

    header {
      padding: 18px;
      background: #2563eb;
      color: white;
      text-align: center;
      border-bottom: 3px solid rgba(255, 255, 255, 0.2);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h2 { margin: 0; font-size: 22px; letter-spacing: 1px; }

    /* Glassmorphism Cards */
    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 18px;
    }

    /* Video Container */
    .video-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 20px;
    }

    video {
      flex: 1;
      max-width: 45%;
      min-width: 260px;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.4);
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.3);
    }
    #local { transform: scaleX(-1); }

    /* Buttons */
    .btn-container {
      text-align: center;
      margin: 15px 0;
    }

    button {
      margin: 5px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-size: 15px;
      font-weight: 500;
      transition: transform 0.15s, background 0.3s;
    }

    button:hover { transform: scale(1.05); }

    #startBtn { background: #10b981; }
    #leaveBtn { background: #ef4444; }
    #muteBtn { background: #8b5cf6; }
    #cameraBtn { background: #0ea5e9; }
    #modeBtn { background: #6b7280; }

    /* Status */
    #status {
      font-size: 16px;
      margin-bottom: 18px;
      font-weight: bold;
    }

    /* Chat */
    #chat {
      max-width: 650px;
      margin: auto;
      height: 380px;
    }

    #chat h3 {
      margin-top: 0;
      text-align: center;
      font-size: 20px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      border-radius: 10px;
      background: #f3f4f6;
      display: flex;
      flex-direction: column;
    }
    body.dark #messages {
      background: #1f2937;
    }

    .message {
      padding: 10px 14px;
      border-radius: 18px;
      margin: 6px 0;
      max-width: 70%;
      font-size: 14px;
    }

    .me { align-self: flex-end; background: #bbf7d0; }
    .partner { align-self: flex-start; background: #e5e7eb; }
    body.dark .partner { background: #374151; }
    body.dark .me { background: #047857; color: white; }

    /* Input */
    #chat-input {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    #msgInput {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #sendBtn {
      background: #2563eb;
    }

    /* Toast */
    #toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 10px 16px;
      border-radius: 6px;
      opacity: 0;
      pointer-events: none;
      transition: 0.4s;
      transform: translateY(-20px);
    }
    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Mobile */
    @media (max-width: 768px) {
      video { max-width: 90%; }
    }
  </style>
</head>
<body>
  <header><h2>🎥 Video Chat Clone - Enhanced UI</h2></header>

  <div class="video-container glass">
    <video id="local" autoplay muted playsinline></video>
    <video id="remote" autoplay playsinline></video>
  </div>

  <div class="btn-container">
    <button id="startBtn">Find Partner</button>
    <button id="leaveBtn" disabled>Leave</button>
    <button id="muteBtn">Mute Mic</button>
    <button id="cameraBtn">Stop Camera</button>
    <button id="modeBtn">Dark Mode</button>
  </div>

  <p id="status">Not connected</p>

  <div id="chat" class="glass">
    <h3>💬 Chat</h3>
    <div id="chat-input">
      <input id="msgInput" placeholder="Type a message..." />
      <button id="sendBtn">Send</button>
    </div>
    <div id="messages"></div>
  </div>

  <div id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
